name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # crypsurance.io's real document root on Hostinger. The main FTP
          # account logs in at /home/<user>/, so the domain's public_html is
          # under domains/<domain>/ — NOT the top-level /public_html/ (that's
          # the primary domain and was silently swallowing every deploy).
          server-dir: ./domains/crypsurance.io/public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
