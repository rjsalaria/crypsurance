name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Diagnose-then-deploy over plain FTP with curl.
      # Reads the known docroot over FTP first: if its index.html matches the
      # live site (same server), a beacon write confirms serving, then the full
      # deploy runs and the live homepage is verified. Every probe result is
      # annotated so the run page tells the whole story.
      - name: Diagnose and deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        shell: bash
        run: |
          set +e
          SERVER=$(printf '%s' "$FTP_SERVER" | tr -d '[:space:]' | sed -E 's#^[a-zA-Z]+://##; s#/.*$##')
          AUTH=(--user "$FTP_USERNAME:$FTP_PASSWORD")
          DOC="domains/crypsurance.io/public_html"

          HOSTONLY=${SERVER%%:*}
          IP=$(getent hosts "$HOSTONLY" | awk '{print $1}' | head -1)
          echo "::warning::FTP server resolves to ${IP:-unresolvable}"

          curl -s "${AUTH[@]}" "ftp://$SERVER/" > root.lst
          echo "::warning::login-dir entries: $(awk '{print $NF}' root.lst | grep -v -e '^\.$' -e '^\.\.$' | paste -sd ' ' - | head -c 400)"

          curl -s "${AUTH[@]}" "ftp://$SERVER/$DOC/" > doc.lst; lc=$?
          echo "::warning::list $DOC exit=$lc entries: $(awk '{print $NF}' doc.lst | grep -v -e '^\.$' -e '^\.\.$' | paste -sd ' ' - | head -c 400)"

          curl -s "${AUTH[@]}" "ftp://$SERVER/$DOC/index.html" -o idx.html; fc=$?
          echo "::warning::fetch $DOC/index.html exit=$fc size=$( [ -f idx.html ] && wc -c < idx.html || echo 0 ) (live site serves 67786 bytes)"

          TS=$(date +%s)
          FOUND=""
          # hPanel FTP Details names "public_html" as the File Upload Path â€”
          # the serving docroot is login-root/public_html; the look-alike
          # domains/crypsurance.io/public_html on the same server is a ghost
          # from an older domain configuration (verified: writes there never
          # appear on the live site).
          for prefix in "public_html" "$DOC" "."; do
            echo "beacon" > b.txt
            curl -sS "${AUTH[@]}" --ftp-create-dirs -T b.txt "ftp://$SERVER/$prefix/beacon-$TS.txt" 2> up.err; uc=$?
            sleep 4
            http=$(curl -s -o /dev/null -w '%{http_code}' "https://crypsurance.io/beacon-$TS.txt?x=$RANDOM")
            echo "::warning::beacon prefix='$prefix' upload-exit=$uc live-http=$http $(head -c 120 up.err)"
            curl -s "${AUTH[@]}" "ftp://$SERVER/" -Q "DELE $prefix/beacon-$TS.txt" -o /dev/null
            if [ "$uc" = "0" ] && [ "$http" = "200" ] && [ -z "$FOUND" ]; then FOUND="$prefix"; fi
          done

          if [ -z "$FOUND" ]; then
            echo "::error::No FTP path serves crypsurance.io - see warnings above (server IP, dir listings, index.html size) to identify the mismatch"
            exit 1
          fi
          echo "::notice::Docroot confirmed at prefix '$FOUND' - deploying"

          cd out
          args=()
          count=0
          while IFS= read -r f; do
            rel="${f#./}"
            args+=( -T "$f" "ftp://$SERVER/$FOUND/$rel" )
            count=$((count+1))
          done < <(find . -type f | sort)
          curl -sS --ftp-create-dirs --retry 2 --retry-delay 3 --connect-timeout 20 "${AUTH[@]}" "${args[@]}" 2> curl.err
          code=$?
          echo "::warning::upload exit=$code for $count files"
          if [ $code -ne 0 ]; then
            head -5 curl.err | while IFS= read -r l; do echo "::error::$l"; done
            exit $code
          fi

          sleep 5
          if curl -s "https://crypsurance.io/?cb=$(date +%s)" | grep -q 'deploy-check'; then
            echo "::notice::LIVE VERIFIED - crypsurance.io is serving this build"
          else
            echo "::error::Upload finished but the live site still serves an old build"
            exit 1
          fi
