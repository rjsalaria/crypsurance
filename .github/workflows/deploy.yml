name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Deploy over plain FTP with curl (the transport the probe verified).
      # The FTP login directory turned out NOT to be the serving docroot:
      # uploads reported success but the live site never changed. So this step
      # DISCOVERS the docroot empirically: it uploads tiny beacon files to
      # candidate paths and checks which one becomes reachable on
      # https://crypsurance.io, deploys there, then verifies the live site
      # serves the new build - failing loudly if it does not.
      - name: Discover docroot and deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        shell: bash
        run: |
          set +e
          SERVER=$(printf '%s' "$FTP_SERVER" | tr -d '[:space:]' | sed -E 's#^[a-zA-Z]+://##; s#/.*$##')
          AUTH=(--user "$FTP_USERNAME:$FTP_PASSWORD")
          TS=$(date +%s)

          # --- 1. beacon discovery -------------------------------------------
          tags=(root domains pub)
          prefixes=("." "domains/crypsurance.io/public_html" "public_html")
          for i in 0 1 2; do
            echo "beacon-${tags[$i]}" > /tmp/beacon.txt
            curl -sS --ftp-create-dirs "${AUTH[@]}" -T /tmp/beacon.txt "ftp://$SERVER/${prefixes[$i]}/deploy-beacon-${tags[$i]}-$TS.txt"
          done
          sleep 4
          FOUND=""
          for i in 0 1 2; do
            codehttp=$(curl -s -o /dev/null -w '%{http_code}' "https://crypsurance.io/deploy-beacon-${tags[$i]}-$TS.txt")
            echo "::warning::beacon ${tags[$i]} (prefix '${prefixes[$i]}') -> HTTP $codehttp"
            if [ "$codehttp" = "200" ] && [ -z "$FOUND" ]; then FOUND="${prefixes[$i]}"; fi
          done
          # clean up beacons regardless of outcome
          for i in 0 1 2; do
            curl -s "${AUTH[@]}" "ftp://$SERVER/" -Q "DELE ${prefixes[$i]}/deploy-beacon-${tags[$i]}-$TS.txt" -o /dev/null
          done
          if [ -z "$FOUND" ]; then
            echo "::error::No beacon became publicly reachable - the FTP account cannot reach the crypsurance.io docroot from any known path. Listing login dir entries for diagnosis:"
            curl -s "${AUTH[@]}" "ftp://$SERVER/" | awk '{print $NF}' | head -12 | while IFS= read -r n; do echo "::warning::login-dir entry: $n"; done
            exit 1
          fi
          echo "::notice::Docroot discovered: FTP prefix '$FOUND'"

          # --- 2. full deploy into the discovered docroot --------------------
          cd out
          args=()
          count=0
          while IFS= read -r f; do
            rel="${f#./}"
            args+=( -T "$f" "ftp://$SERVER/$FOUND/$rel" )
            count=$((count+1))
          done < <(find . -type f | sort)
          echo "uploading $count files to prefix '$FOUND'"
          curl -sS --ftp-create-dirs --retry 2 --retry-delay 3 --connect-timeout 20 "${AUTH[@]}" "${args[@]}" 2> curl.err
          code=$?
          echo "::warning::upload exit=$code for $count files"
          if [ $code -ne 0 ]; then
            head -5 curl.err | while IFS= read -r l; do echo "::error::$l"; done
            exit $code
          fi

          # --- 3. verify the LIVE site serves this build ---------------------
          sleep 5
          if curl -s "https://crypsurance.io/?cb=$(date +%s)" | grep -q 'deploy-check'; then
            echo "::notice::LIVE VERIFIED - crypsurance.io is serving this build"
          else
            echo "::error::Upload finished but the live site still serves an old build"
            exit 1
          fi
