name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Upload with lftp instead of FTP-Deploy-Action. The latter kept failing
      # with "550 No such file or directory" (it tries to STOR files before
      # creating parent dirs — a known bug on flaky shared-host FTP). lftp's
      # `mirror -R` creates the directory tree reliably and needs no state file.
      #
      # The FTP account is domain-scoped: it logs in directly at
      # /home/u883708131/domains/crypsurance.io/public_html, which IS the live
      # document root — so we mirror out/ into the login dir itself ("./").
      # No --delete: this only adds/overwrites, so nothing else on the server
      # (subdomain folder, .htaccess, etc.) can be removed.
      - name: Deploy via lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        shell: bash
        run: |
          # GitHub runs steps with `bash -e`; disable it so a non-zero lftp exit
          # doesn't abort before we capture the log to the job summary.
          set +e
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          # Sequential transfer (Hostinger caps concurrent FTP connections),
          # with reconnect/retries so a dropped control channel resumes instead
          # of aborting. Log is captured to the job summary for diagnosis.
          lftp -e "
            set ftp:ssl-allow no;
            set ssl:verify-certificate no;
            set net:max-retries 5;
            set net:timeout 30;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 1;
            mirror -R --continue --verbose ./out/ ./;
            bye
          " -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" > lftp.log 2>&1
          code=$?
          {
            echo "## lftp deploy log (exit code $code)"
            echo '```'
            tail -c 9000 lftp.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $code
