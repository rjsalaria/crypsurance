name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./out/
          # The FTP account is domain-scoped: it logs in directly at
          # /home/u883708131/domains/crypsurance.io/public_html — which IS the
          # live document root. So upload into the login folder itself ("./").
          # Any deeper path (e.g. /public_html/) just creates junk sub-folders
          # INSIDE the site root, which is why earlier deploys never went live.
          server-dir: ./
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
