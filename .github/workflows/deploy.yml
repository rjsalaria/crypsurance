name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # Upload with curl over plain FTP — the transport the connectivity
      # probe proved works end-to-end (connect, login, data channel). lftp and
      # FTP-Deploy-Action both failed against this server; curl is the one
      # tool verified against it.
      #
      # The FTP account is domain-scoped: it logs in directly at
      # /home/u883708131/domains/crypsurance.io/public_html, which IS the live
      # document root — so files upload to "./". One curl invocation carries a
      # -T/URL pair per file, reusing the connection instead of logging in 90
      # times (shared hosts rate-limit logins). Only adds/overwrites — nothing
      # else on the server (subdomain folder, .htaccess) can be removed.
      - name: Deploy via curl FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        shell: bash
        run: |
          set +e
          # Tolerate common secret-paste mistakes (scheme prefix, whitespace).
          SERVER=$(printf '%s' "$FTP_SERVER" | tr -d '[:space:]' | sed -E 's#^[a-zA-Z]+://##; s#/.*$##')

          cd out
          args=()
          count=0
          while IFS= read -r f; do
            rel="${f#./}"
            args+=( -T "$f" "ftp://$SERVER/$rel" )
            count=$((count+1))
          done < <(find . -type f | sort)

          echo "uploading $count files"
          curl -sS --ftp-create-dirs --retry 2 --retry-delay 3             --connect-timeout 20             --user "$FTP_USERNAME:$FTP_PASSWORD" "${args[@]}" 2> curl.err
          code=$?
          echo "::warning::curl upload exit=$code for $count files"
          if [ $code -ne 0 ]; then
            head -5 curl.err | while IFS= read -r l; do echo "::error::$l"; done
            exit $code
          fi

          # Self-verify: the built index.html carries a deploy-check meta tag;
          # confirm the live site is actually serving the new build.
          sleep 5
          if curl -s "https://crypsurance.io/?cb=$(date +%s)" | grep -q 'deploy-check'; then
            echo "::notice::LIVE VERIFIED - crypsurance.io is serving this build"
          else
            echo "::warning::Upload succeeded but live page does not show the new marker yet"
          fi
